name: CTest

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ctest:
    name: ctest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libboost-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy gudhi dionysus icecream argh

      - name: Configure
        run: |
          PYEXE="$(python -c 'import sys; print(sys.executable)')"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -Doin_build_examples=OFF -Doin_build_tests=ON -DPython_EXECUTABLE="$PYEXE"

      - name: Build
        run: cmake --build build -j

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
