name: Python Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  python_tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtbb-dev libboost-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy gudhi dionysus icecream argh

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -Doin_build_examples=OFF -Doin_build_tests=ON -DPython_EXECUTABLE="$(which python)"

      - name: Build
        run: cmake --build build -j

      - name: Run Python tests
        run: ctest --test-dir build --output-on-failure -R "^py-"
