name: Build and Upload Wheels

on:
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Upload built wheels to PyPI"
        required: true
        default: false
        type: boolean

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.23.3

      - name: Cache cibuildwheel downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/cibuildwheel
            ~/Library/Caches/cibuildwheel
          key: cibw-${{ runner.os }}-${{ hashFiles('pyproject.toml', '.github/workflows/build_wheels.yaml') }}
          restore-keys: |
            cibw-${{ runner.os }}-

      - name: Print selected wheel identifiers
        run: python -m cibuildwheel --print-build-identifiers
        env:
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_SKIP: "*musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"

      - name: Build wheels
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
            python -m cibuildwheel --output-dir wheelhouse && break
            n=$((n+1))
            if [ "$n" -ge 3 ]; then
              echo "cibuildwheel failed after ${n} attempts"
              exit 1
            fi
            sleep_seconds=$((30*n))
            echo "Retrying cibuildwheel in ${sleep_seconds}s (attempt $((n+1))/3)..."
            sleep "$sleep_seconds"
          done
        env:
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_SKIP: "*musllinux*"
          CIBW_BEFORE_ALL_LINUX: "dnf install -y boost-devel || yum install -y boost-devel"
          CIBW_BEFORE_ALL_MACOS: "brew install boost"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"

      - name: List built wheels
        run: ls -l wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: built-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  upload_pypi:
    name: Upload wheels to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: ${{ inputs.publish_to_pypi }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: built-wheels-*
          merge-multiple: true
          path: dist

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: dist
