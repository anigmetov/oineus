# ReadTheDocs build configuration for Oineus.
# https://docs.readthedocs.com/platform/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - libboost-dev
    - cmake
    - ninja-build
  jobs:
    # Build the C++ extension in place so autosummary can import oineus.
    post_install:
      - pip install -v .

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
